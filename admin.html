<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel (P2P)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        button { width: 100%; height: 150px; font-size: 40px; background: green; color: white; }
    </style>
</head>
<body>
    <h1>Пульт управления</h1>
    <p id="my-id">Инициализация...</p>
    <button onclick="broadcast('FLASH')">ВСПЫШКА!</button>

    <script>
        // Тот же ID, что и у клиентов
        const ADMIN_ID = 'kazakhstan_event_master_777';
        const peer = new Peer(ADMIN_ID);
        const connections = [];

        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = "Ваш пульт готов! ID: " + id;
        });

        peer.on('connection', (conn) => {
            connections.push(conn);
            console.log("Новый гость подключился!");
        });

        function broadcast(msg) {
            connections.forEach(conn => conn.send(msg));
        }
    </script>
</body>
</html>
