<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        button { width: 100%; height: 100px; font-size: 30px; background: red; color: white; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>Пульт Ведущего</h1>
    <button onclick="sendFlash()">ЗАПУСТИТЬ ВСПЫШКУ</button>

    <script>
        const socket = io("https://ВАШ-СЕРВЕР.onrender.com");
        function sendFlash() {
            socket.emit('admin_flash');
        }
    </script>
</body>
</html>
