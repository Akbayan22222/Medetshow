<!DOCTYPE html>
<html>
<head>
    <title>ADMIN FLASH</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body style="background: #222; display: flex; justify-content: center; padding-top: 50px;">
    <button onclick="sendFlash()" style="width: 80%; height: 200px; font-size: 40px; background: gold; border-radius: 20px; font-weight: bold;">
        ЖАРҚЫЛДАТУ (ВСЕ)
    </button>

    <script>
        const peer = new Peer(); 
        
        function sendFlash() {
            // Тікелей экранның ID-іне хабарлама жібереді
            const conn = peer.connect('medet-flash-hub-2026');
            conn.on('open', () => {
                conn.send('FLASH');
            });
        }
    </script>
</body>
</html>
