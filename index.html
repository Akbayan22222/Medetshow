<!DOCTYPE html>
<html>
<head>
    <title>MEDET SHOW FLASH</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body style="background: #000; text-align: center; color: white;">
    <h1 style="margin-top: 100px;">MEDET SHOW</h1>
    <button onclick="guestFlash()" style="width: 250px; height: 250px; border-radius: 50%; background: white; color: black; font-size: 24px; font-weight: bold; border: 10px solid gold;">
        ҚОСЫЛУ
    </button>

    <script>
        const peer = new Peer();
        function guestFlash() {
            const conn = peer.connect('medet-flash-hub-2026');
            conn.on('open', () => {
                conn.send('FLASH');
            });
        }
    </script>
</body>
</html>
