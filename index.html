<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic Event</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; transition: background 0.1s; overflow: hidden; }
        #status { font-size: 14px; opacity: 0.5; margin-bottom: 20px; }
        button { padding: 20px 40px; font-size: 18px; border-radius: 50px; border: none; background: #e91e63; color: white; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .active { background: #fff !important; }
    </style>
</head>
<body>
    <div id="status">Ожидание подключения...</div>
    <button id="startBtn">Войти в Шоу</button>

    <script>
        const status = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        
        // ЗАМЕНИТЕ ЭТУ ССЫЛКУ на адрес вашего будущего сервера (Render/Railway)
        const socket = io("https://ВАШ-СЕРВЕР.onrender.com");

        startBtn.onclick = () => {
            // Активируем аудио контекст (нужно для iOS/Android)
            startBtn.style.display = 'none';
            status.innerText = 'Вы в игре! Не закрывайте экран.';
            // Вибро-отклик для теста
            if (navigator.vibrate) navigator.vibrate(100);
        };

        socket.on('connect', () => { status.innerText = 'Подключено. Ждите сигнала...'; });

        // ГЛАВНАЯ МАГИЯ: Получаем команду ВСПЫШКА
        socket.on('flash_trigger', () => {
            document.body.style.backgroundColor = 'white';
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            setTimeout(() => {
                document.body.style.backgroundColor = 'black';
            }, 500);
        });
    </script>
</body>
</html>
