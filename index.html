<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Event Client</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; transition: background 0.2s; }
        button { padding: 20px; font-size: 20px; background: #e91e63; color: white; border: none; border-radius: 10px; }
    </style>
</head>
<body>
    <button id="connBtn">ПОДКЛЮЧИТЬСЯ К ШОУ</button>
    <p id="statusText">Ожидание нажатия кнопки...</p>

    <script>
        const connBtn = document.getElementById('connBtn');
        const statusText = document.getElementById('statusText');
        
        // ВНИМАНИЕ: Здесь впишите ЛЮБОЕ уникальное имя, например 'my_magic_event_2026'
        const ADMIN_ID = 'kazakhstan_event_master_777'; 

        const peer = new Peer(); 

        connBtn.onclick = () => {
            const conn = peer.connect(ADMIN_ID);
            connBtn.style.display = 'none';
            statusText.innerText = "Связь установлена! Ждите сигнала.";

            conn.on('data', (data) => {
                if (data === 'FLASH') {
                    document.body.style.backgroundColor = 'white';
                    if (navigator.vibrate) navigator.vibrate(200);
                    setTimeout(() => { document.body.style.backgroundColor = 'black'; }, 500);
                }
            });
        };
    </script>
</body>
</html>
