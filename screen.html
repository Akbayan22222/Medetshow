<!DOCTYPE html>
<html>
<head>
    <title>MEDET SHOW SCREEN</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: gold; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Arial Black', sans-serif; }
        .title { font-size: 50px; text-align: center; }
    </style>
</head>
<body>
    <div id="display" class="title">MEDET SHOW<br>КҮТУДЕ...</div>

    <script>
        // Бұл Экранның тұрақты ID-і. Оны ешқашан өзгертпе!
        const peer = new Peer('medet-flash-hub-2026'); 

        peer.on('open', () => {
            document.getElementById('display').innerText = "МЕДЕТ ШОУ\nДАЙЫН!";
        });

        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if (data === 'FLASH') {
                    document.body.style.backgroundColor = 'white';
                    setTimeout(() => { document.body.style.backgroundColor = 'black'; }, 150);
                }
            });
        });
    </script>
</body>
</html>
