<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LED SCREEN SHOW</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { 
            margin: 0; padding: 0;
            background: #000; 
            color: #fff; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
            transition: background 0.05s;
        }
        #text {
            font-size: 80px; /* Фиксированный размер для теста */
            text-align: center;
            text-transform: uppercase;
            display: none; /* Скрыт по умолчанию */
            z-index: 999;
            color: #fff;
            text-shadow: 0 0 30px rgba(255,255,255,1);
        }
    </style>
</head>
<body>

    <div id="text">MEDET MUHAMEDZHANOV SHOW</div>

    <script>
        const ADMIN_ID = 'medet_show_master_2026'; 
        const peer = new Peer();
        const textElement = document.getElementById('text');

        // Пытаемся подключиться к админу
        const connectToAdmin = () => {
            const conn = peer.connect(ADMIN_ID);
            
            conn.on('open', () => {
                console.log("Экран успешно подключен!");
                // Оповещение на экране при старте (можно убрать потом)
                textElement.innerText = "ГОТОВО К ШОУ";
                textElement.style.display = "block";
                setTimeout(() => { textElement.style.display = "none"; textElement.innerText = "MEDET MUHAMEDZHANOV SHOW"; }, 2000);
            });

            conn.on('data', (data) => {
                if (data === 'FLASH') {
                    // 1. Делаем фон белым
                    document.body.style.backgroundColor = "white";
                    // 2. Показываем текст (черным на белом фоне, чтобы было видно)
                    textElement.style.display = "block";
                    textElement.style.color = "black";

                    setTimeout(() => {
                        document.body.style.backgroundColor = "black";
                        textElement.style.display = "none";
                    }, 600); 
                }
            });

            conn.on('close', () => {
                console.log("Потеря связи, переподключение...");
                setTimeout(connectToAdmin, 2000);
            });
        };

        peer.on('open', connectToAdmin);
    </script>
</body>
</html>
