<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZHANAT SHOW - GUEST</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .status-dot { width: 15px; height: 15px; background: red; border-radius: 50%; margin: 10px auto; }
        .online { background: #00ffcc; box-shadow: 0 0 10px #00ffcc; }
        h2 { color: gold; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="main-ui">
        <h2>ZHANAT SHOW</h2>
        <div id="dot" class="status-dot"></div>
        <p id="info">ПОДКЛЮЧЕНИЕ К ЖАНАТУ...</p>
    </div>

    <script>
        const ADMIN_ID = 'zhanat_show_2026';
        const peer = new Peer();
        let track = null;

        // Камераға рұқсат алу (Фонарь үшін)
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
            .then(stream => { track = stream.getVideoTracks()[0]; })
            .catch(() => { alert("Рұқсат беріңіз (Разрешите камеру для фонарика)"); });

        peer.on('open', () => {
            const conn = peer.connect(ADMIN_ID);
            
            conn.on('open', () => {
                document.getElementById('dot').classList.add('online');
                document.getElementById('info').innerText = "ВЫ В СЕТИ! ЖДИТЕ СИГНАЛА 🔥";
                
                conn.on('data', (data) => {
                    if (data === 'FLASH') toggleFlash();
                });
            });
        });

        function toggleFlash() {
            if (!track) return;
            track.applyConstraints({ advanced: [{ torch: true }] });
            setTimeout(() => {
                track.applyConstraints({ advanced: [{ torch: false }] });
            }, 100);
        }

        // Android-та ұйықтап қалмау үшін
        setInterval(() => { if(peer.disconnected) peer.reconnect(); }, 5000);
    </script>
</body>
</html>
