<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Zhanat Admin</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        #count { font-size: 80px; color: #ffcc00; font-weight: bold; }
        .btn { width: 80%; height: 100px; font-size: 20px; border-radius: 20px; border: none; margin: 10px; cursor: pointer; font-weight: bold; }
        .flash { background: #ffcc00; }
        .beat { background: #333; color: white; }
        .active { background: #ff3b30; }
    </style>
</head>
<body>
    <h2>ZHANAT CONTROL</h2>
    <div id="count">0</div>
    <p>ГОСТЕЙ</p>
    <button class="btn flash" onclick="sendFlash()">ЗАЖЕЧЬ ФОНАРИ</button>
    <button id="beatBtn" class="btn beat" onclick="toggleBeat()">АВТО-БИТ</button>

    <script>
        const ADMIN_ID = 'zhanat_master_2026';
        const peer = new Peer(ADMIN_ID);
        let connections = [];
        let isBeat = false;
        let analyser, dataArray;

        peer.on('connection', (conn) => {
            connections.push(conn);
            document.getElementById('count').innerText = connections.length;
            conn.on('close', () => {
                connections = connections.filter(c => c !== conn);
                document.getElementById('count').innerText = connections.length;
            });
        });

        function sendFlash() {
            connections.forEach(c => { if(c.open) c.send('FLASH'); });
        }

        async function toggleBeat() {
            if (isBeat) { isBeat = false; return; }
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const ctx = new AudioContext();
            analyser = ctx.createAnalyser();
            ctx.createMediaStreamSource(stream).connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            isBeat = true;
            loop();
        }

        function loop() {
            if (!isBeat) return;
            analyser.getByteFrequencyData(dataArray);
            if (dataArray[1] > 165) { sendFlash(); setTimeout(loop, 180); }
            else { requestAnimationFrame(loop); }
        }
    </script>
</body>
</html>
